<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Top-Down RPG</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="start-screen" class="lobby-screen">
      <h1>OURBASE</h1>
      <div class="lobby-box">
        <label>YOUR NAME</label>
        <input type="text" id="mp-name" value="Player" />
        
        <button id="mp-btn-create" class="action-btn create-btn">🎮 CREATE NEW ROOM</button>
        
        <div class="divider">
          <span>OR JOIN EXISTING</span>
        </div>
        
        <input type="number" id="mp-room-id" placeholder="Enter Room Code" />
        <button id="mp-btn-join" class="action-btn join-btn">🔑 JOIN ROOM</button>
        
        <div id="mp-error" class="error-msg" style="display: none;"></div>
      </div>
    </div>
    
    <div id="selection-screen" style="display: none;">
      <!-- DRAFT PICK LAYOUT -->

      <!-- LEFT: Player List -->
      <div class="dp-left">
        <div class="dp-room-code">ROOM <span id="lobby-room-id">----</span></div>
        <div class="dp-player-label">PLAYERS</div>
        <div id="lobby-player-list" class="dp-player-list">
          <!-- populated by JS -->
        </div>
      </div>

      <!-- CENTER: Phaser Preview + Stats -->
      <div class="dp-center">
        <!-- Phaser canvas is behind this div -->
        <div class="dp-hero-info">
          <div class="dp-hero-name-row">
            <span id="detail-name">-</span>
            <span id="detail-role" class="dp-role-badge">-</span>
          </div>
          <div class="dp-stats">
            <div class="dp-stat-row">
              <span class="dp-stat-label">HP</span>
              <div class="dp-bar-bg"><div id="bar-hp" class="dp-bar dp-bar-hp"></div></div>
              <span id="txt-hp" class="dp-stat-val">-</span>
            </div>
            <div class="dp-stat-row" id="row-atk">
              <span class="dp-stat-label">ATK</span>
              <div class="dp-bar-bg"><div id="bar-atk" class="dp-bar dp-bar-atk"></div></div>
              <span id="txt-atk" class="dp-stat-val">-</span>
            </div>
            <div class="dp-stat-row">
              <span class="dp-stat-label">SPD</span>
              <div class="dp-bar-bg"><div id="bar-spd" class="dp-bar dp-bar-spd"></div></div>
              <span id="txt-spd" class="dp-stat-val">-</span>
            </div>
          </div>
        </div>
        <button id="select-hero-btn" class="dp-confirm-btn">CONFIRM</button>
      </div>

      <!-- RIGHT: Role Tabs + Hero Grid -->
      <div class="dp-right">
        <div class="dp-role-tabs">
          <button class="role-tab active" data-role="all">All</button>
          <button class="role-tab" data-role="Tank">Tank</button>
          <button class="role-tab" data-role="Fighter">Fighter</button>
          <button class="role-tab" data-role="Assassin">Assassin</button>
          <button class="role-tab" data-role="Marksman">Marksman</button>
          <button class="role-tab" data-role="Mage">Mage</button>
          <button class="role-tab" data-role="Support">Support</button>
        </div>
        <div class="dp-grid-scroll">
          <div id="hero-grid" class="dp-hero-grid">
            <!-- populated by JS -->
          </div>
        </div>
      </div>
    </div>

    <div id="respawn-overlay" style="display: none;" class="respawn-overlay">
      <div class="respawn-simple-text">
        Respawning in <span id="respawn-timer">5</span>s
      </div>
    </div>

    <!-- Virtual Controls Overlay -->
    <div id="virtual-controls" style="display: none;">
      <div id="joystick-zone">
        <div id="joystick-base">
          <div id="joystick-stick"></div>
        </div>
      </div>
      <div id="action-buttons">
        <button id="btn-attack" class="action-btn-v">A</button>
        <button id="btn-skill" class="action-btn-v">B</button>
      </div>
    </div>

    <div id="game-container"></div>
    
    <!-- HTML Minimap Overlay -->
    <div id="html-minimap" style="display: none;">
      <div id="minimap-bg"></div>
      <div id="minimap-entities"></div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
