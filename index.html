<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Top-Down RPG</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="start-screen" class="lobby-screen">
      <h1>OURBASE</h1>
      <div class="lobby-box">
        <label>YOUR NAME</label>
        <input type="text" id="mp-name" value="Player" />
        
        <button id="mp-btn-create" class="action-btn create-btn">🎮 CREATE NEW ROOM</button>
        
        <div class="divider">
          <span>OR JOIN EXISTING</span>
        </div>
        
        <input type="number" id="mp-room-id" placeholder="Enter Room Code" />
        <button id="mp-btn-join" class="action-btn join-btn">🔑 JOIN ROOM</button>
        
        <div id="mp-error" class="error-msg" style="display: none;"></div>
      </div>
    </div>
    
    <div id="selection-screen" style="display: none;">
      <!-- Top Right Room Code -->
      <div class="top-right-room-code">
        <span id="lobby-room-id" style="font-weight: bold; color: #4ade80;">----</span>
      </div>

      <!-- Sisi Kiri dibuat transparan agar Phaser Preview terlihat -->
      <div class="selection-preview-area">
        <div class="hero-stats">
          <div class="stat-row">
            <span class="stat-label">HP</span>
            <div class="stat-bar-container"><div id="bar-hp" class="stat-bar" style="width: 60%;"></div></div>
            <span id="txt-hp" class="stat-val">120</span>
          </div>
          <div class="stat-row" id="row-atk">
            <span class="stat-label">ATK</span>
            <div class="stat-bar-container"><div id="bar-atk" class="stat-bar" style="width: 50%;"></div></div>
            <span id="txt-atk" class="stat-val">20</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">SPD</span>
            <div class="stat-bar-container"><div id="bar-spd" class="stat-bar" style="width: 75%;"></div></div>
            <span id="txt-spd" class="stat-val">150</span>
          </div>
        </div>
      </div>
      
      <!-- Sisi Rapat berisi info & grid hero -->
      <div class="selection-panel-area">
        <div class="selection-header">
          <h2>PILIH HERO</h2>
          <div class="role-tabs">
            <button class="role-tab active" data-role="all">Semua</button>
            <button class="role-tab" data-role="Tank">Tank</button>
            <button class="role-tab" data-role="Fighter">Fighter</button>
            <button class="role-tab" data-role="Assassin">Assassin</button>
            <button class="role-tab" data-role="Marksman">Marksman</button>
            <button class="role-tab" data-role="Support">Support</button>
          </div>
        </div>
        
        <div class="selection-body">
          <div class="left-panel-column">
            <div class="hero-details">
              <div class="hero-details-header">
                <h3 id="detail-name">Darius</h3>
                <span id="detail-role" class="hero-role-badge">Fighter</span>
              </div>
              <p id="detail-desc" class="hero-desc">Pejuang garis depan bersenjata pedang besar.</p>
            </div>
            
            <div class="lobby-info-box">
              <div class="lobby-players">
                <span class="lobby-label">PLAYERS IN LOBBY</span>
                <div id="lobby-player-list" class="lobby-player-list">
                  <!-- Will be populated dynamically -->
                </div>
              </div>
            </div>
          </div>
          
          <div class="hero-grid-container">
            <div id="hero-grid" class="hero-grid">
              <!-- Grid items will be dynamically generated by JS -->
            </div>
          </div>
        </div>
        
        <div class="selection-footer">
          <button id="select-hero-btn">MULAI GAME</button>
        </div>
      </div>
    </div>

    <div id="respawn-overlay" style="display: none;" class="respawn-overlay">
      <div class="respawn-box">
        <h3>YOU DIED</h3>
        <p>Respawning in <span id="respawn-timer">5</span>s...</p>
      </div>
    </div>

    <!-- Virtual Controls Overlay -->
    <div id="virtual-controls" style="display: none;">
      <div id="joystick-zone">
        <div id="joystick-base">
          <div id="joystick-stick"></div>
        </div>
      </div>
      <div id="action-buttons">
        <button id="btn-attack" class="action-btn-v">A</button>
        <button id="btn-skill" class="action-btn-v">B</button>
      </div>
    </div>

    <div id="game-container"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
